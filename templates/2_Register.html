{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Register</title>
    <link rel="stylesheet" href="{% static 'css.css' %}">
    <link href="https://fonts.googleapis.com/css?family=Montserrat" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-image: url('https://www.hdwallpapers.in/download/football_players_expression_hd_football-HD.jpg');
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #giris {
            background: rgba(255, 255, 255, 0.85); /* Transparent white */
            width: 450px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 10px;
        }

        p {
            text-align: center;
            font-size: 14px;
            margin-bottom: 30px;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: none;
            border-bottom: 2px solid #aaa;
            background: transparent;
            font-size: 14px;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-bottom: 2px solid #324D5C;
            outline: none;
        }

        input[type="submit"] {
            padding: 10px 20px;
            background-color: #540032;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s ease;
        }

        input[type="submit"]:hover {
            background-color: #1C61BF;
        }

        a {
            display: block;
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
            color: #0056b3;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div id="giris">
        <h1>Hello,</h1>
        <p>Please sign in to stroll!</p>
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required>
            <input type="text" name="email" placeholder="E-Mail" required>
            <input type="password" name="password1" placeholder="Password" required>
            <input type="password" name="password2" placeholder="Confirm Password" required>
            <input type="submit" value="Submit">
            <a href="{% url 'Login_3' %}">Already have an account? Login</a>
        </form>
    </div>
</body>
</html>
