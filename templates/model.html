        @keyframes gradientBG {
            0% { background-position: 0% 50%; }

            margin-bottom: 25px;
            position: relative;

        h2::after {
            content: "";
            position: absolute;
            width: 80px;
            height: 3px;
            background: #ffca28;
            left: 50%;
            bottom: -10px;
            transform: translateX(-50%);
            border-radius: 5px;
        }

        /* ⚙️ Labels and Inputs */
        form label {
            display: block;
            font-weight: 600;
            color: #222;
            margin-top: 15px;

            width: 100%;
            padding: 10px 12px;
            margin-top: 6px;
            border: 2px solid #ccc;
            border-radius: 10px;
            font-size: 15px;
            transition: 0.3s;
        }

        select:focus, input:focus {
            border-color: #1976d2;
            outline: none;
            box-shadow: 0 0 8px rgba(25, 118, 210, 0.5);
        }

        /* 💥 Button */
        button {
            width: 100%;
            margin-top: 25px;
            padding: 12px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #ff9800, #f44336);
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        button:hover {
            background: linear-gradient(90deg, #f44336, #ff9800);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(244, 67, 54, 0.3);
        }

        /* 🌐 Responsive Design */
        @media (max-width: 700px) {
            .container {
                width: 90%;
                padding: 25px;
            }
            h2 {
                font-size: 22px;
            }
        }

        /* 🏏 Decorative Emoji Animation */
        .emoji {
            text-align: center;
            font-size: 30px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
